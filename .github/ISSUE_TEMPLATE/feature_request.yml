name: Feature Request
description: Suggest a new feature for Agent Replay
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for your feature suggestion!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature you'd like to see
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: How would you use this feature?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions?
